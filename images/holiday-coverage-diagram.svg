<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 660" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1040" height="660" rx="14" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="1039" height="659" rx="14" fill="none" stroke="#e2e8f0"/>

  <!-- title -->
  <text x="40" y="46" font-size="23" font-weight="700" fill="#0f172a">Setting up July 3rd coverage</text>
  <text x="40" y="72" font-size="14" fill="#475569">A holiday: two people are off — one on the multi-person <tspan font-weight="600" fill="#334155">day desk</tspan>, one on the <tspan font-weight="600" fill="#334155">overnight</tspan> shift. Coverage has to move on both.</text>

  <!-- base schedule strip -->
  <text x="40" y="108" font-size="11" font-weight="700" letter-spacing="0.6" fill="#64748b">THE NORMAL SCHEDULE</text>
  <g font-size="12.5">
    <rect x="40" y="118" width="640" height="34" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="60" cy="135" r="4" fill="#7c3aed"/>
    <text x="72" y="139" fill="#334155"><tspan font-weight="600">Day desk</tspan>  08:00–20:00 · Zane Pike + Pax Quinn</text>
    <circle cx="430" cy="135" r="4" fill="#db2777"/>
    <text x="442" y="139" fill="#334155"><tspan font-weight="600">Night</tspan>  20:00–08:00 (+1d) · Briar Cole</text>
  </g>
  <text x="700" y="139" font-size="12.5" fill="#64748b">Off Jul 3: <tspan font-weight="700" fill="#0f172a">Zane</tspan> (day), <tspan font-weight="700" fill="#0f172a">Briar</tspan> (night)</text>

  <!-- divider -->
  <line x1="520" y1="178" x2="520" y2="624" stroke="#e2e8f0"/>

  <!-- ============ LEFT: native ============ -->
  <rect x="40" y="178" width="430" height="30" rx="8" fill="#fef2f2"/>
  <text x="56" y="198" font-size="14" font-weight="700" fill="#b91c1c">In TaskCall — by hand</text>
  <text x="270" y="198" font-size="12" fill="#9f1239">stack a blanket override per shift</text>

  <!-- native card 1 -->
  <rect x="40" y="222" width="430" height="104" rx="10" fill="#ffffff" stroke="#fecaca"/>
  <text x="56" y="244" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#b91c1c">OVERRIDE LAYER · JUL 3 · DAY 08:00–20:00</text>
  <text x="56" y="262" font-size="11" fill="#94a3b8">Override other layers in this window · roster you type:</text>
  <g font-size="12" font-weight="600">
    <rect x="56" y="272" width="92" height="24" rx="12" fill="#ede9fe" stroke="#ddd6fe"/><text x="102" y="288" fill="#5b21b6" text-anchor="middle">Pax Quinn</text>
    <rect x="156" y="272" width="92" height="24" rx="12" fill="#ede9fe" stroke="#ddd6fe"/><text x="202" y="288" fill="#5b21b6" text-anchor="middle">Orin Vale</text>
  </g>
  <text x="56" y="316" font-size="11.5" fill="#b91c1c">⚠ you re-type Pax too — miss a name and she drops off-call.</text>

  <!-- native card 2 -->
  <rect x="40" y="336" width="430" height="100" rx="10" fill="#ffffff" stroke="#fecaca"/>
  <text x="56" y="358" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#b91c1c">OVERRIDE LAYER · JUL 3 · NIGHT 20:00–08:00 (+1d)</text>
  <g font-size="12" font-weight="600">
    <rect x="56" y="370" width="96" height="24" rx="12" fill="#fce7f3" stroke="#fbcfe8"/><text x="104" y="386" fill="#9d174d" text-anchor="middle">Vesper Lyn</text>
  </g>
  <text x="56" y="414" font-size="11.5" fill="#b91c1c">⚠ the overnight runs into Jul 4 — a second window to track.</text>

  <!-- native footer -->
  <rect x="40" y="448" width="430" height="62" rx="10" fill="#fef2f2"/>
  <text x="56" y="472" font-size="12.5" fill="#9f1239">✕ no preview   ✕ re-type every name by hand</text>
  <text x="56" y="494" font-size="12.5" fill="#9f1239">✕ a wrong roster quietly pages the wrong person</text>

  <!-- ============ RIGHT: toolkit ============ -->
  <rect x="570" y="178" width="430" height="30" rx="8" fill="#f0fdf4"/>
  <text x="586" y="198" font-size="14" font-weight="700" fill="#15803d">With the toolkit</text>
  <text x="792" y="198" font-size="12" fill="#166534">name the one person who's off</text>

  <!-- toolkit op 1 -->
  <rect x="570" y="222" width="430" height="104" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="586" y="246" font-size="14" fill="#0f172a"><tspan font-weight="700">Zane Pike</tspan> <tspan fill="#16a34a" font-weight="700">→</tspan> <tspan font-weight="700">Orin Vale</tspan>  <tspan font-size="11.5" fill="#64748b">· Jul 3 · day</tspan></text>
  <text x="586" y="268" font-size="11.5" fill="#15803d">pick the one person who's off — Pax stays on automatically.</text>
  <rect x="586" y="280" width="398" height="32" rx="8" fill="#f0fdf4" stroke="#dcfce7"/>
  <text x="598" y="300" font-size="11.5" fill="#166534"><tspan font-weight="700">Preview · Jul 3 day desk:</tspan> Pax Quinn, Orin Vale  <tspan fill="#16a34a">— only Zane changed</tspan></text>

  <!-- toolkit op 2 -->
  <rect x="570" y="336" width="430" height="100" rx="10" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="586" y="360" font-size="14" fill="#0f172a"><tspan font-weight="700">Briar Cole</tspan> <tspan fill="#16a34a" font-weight="700">→</tspan> <tspan font-weight="700">Vesper Lyn</tspan>  <tspan font-size="11.5" fill="#64748b">· Jul 3 · night</tspan></text>
  <text x="586" y="382" font-size="11.5" fill="#15803d">covers the full overnight — through 08:00 on Jul 4 — in one move.</text>
  <rect x="586" y="394" width="398" height="32" rx="8" fill="#f0fdf4" stroke="#dcfce7"/>
  <text x="598" y="414" font-size="11.5" fill="#166534"><tspan font-weight="700">Preview · Jul 3→4 night:</tspan> Vesper Lyn  <tspan fill="#16a34a">— midnight handled</tspan></text>

  <!-- toolkit footer -->
  <rect x="570" y="448" width="430" height="62" rx="10" fill="#f0fdf4"/>
  <text x="586" y="472" font-size="12.5" fill="#166534">✓ dry-run preview of the full roster   ✓ cancel any time from a list</text>
  <text x="586" y="494" font-size="12.5" fill="#166534">✓ only the people who are off ever change</text>

  <!-- bottom takeaway -->
  <text x="520" y="556" font-size="13.5" fill="#334155" text-anchor="middle">Native overrides are <tspan font-weight="700" fill="#b91c1c">blanket</tspan> — one layer replaces everyone in the window, so you re-list rosters by hand.</text>
  <text x="520" y="578" font-size="13.5" fill="#334155" text-anchor="middle">The toolkit edits are <tspan font-weight="700" fill="#15803d">surgical</tspan>: name who's off and preview the result before it's written.</text>
  <text x="520" y="610" font-size="11" fill="#94a3b8" text-anchor="middle">Names are fictional. Independent third-party tool — not affiliated with or endorsed by TaskCall.</text>
</svg>
